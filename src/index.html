<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>N瀬タイマー</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic&display=swap" rel="stylesheet">
</head>

<body>
  <h1>N瀬タイマー</h1>

  <div class="main-content">

    <div class="nnose-area">
      <div class="nose-value">NaN瀬</div>
    </div>

    <div class="main-control">
      <div class="info">
        本日は<span id="restinfo">平日</span>です。<br>
      </div>


      <button id="seated">登校しました！</button>
      <button id="open-settings">設定</button>

    </div>

    <div id="achievements-wrapper">
      <div id="achievement-text">実績: n/n</div>
    </div>
  </div>


  <div id="settings-panel" style="display: none;">
    <div class="shader"></div>
    <div class="settings-content">
      <h2>設定</h2>
      <button id="close-settings" aria-label="もちろん閉じるボタンです。" title="clo se">clo瀬</button>
      <label for="offset">オフセット</label>
      <input type="number" id="offset">
      <label for="offset">秒</label>
      <div class="reset-buttons">
        <button id="reset-nose">瀬数削除</button>
        <button id="reset-achievement" style="display: none;">実績削除</button>
      </div>
    </div>
  </div>
  <div id="setup-panel" style="display: none;">
    <div class="shader"></div>
    <div class="setup-content">
      <h2>開始質問: 今何瀬？</h2>
      <input type="number" id="nose-input">
      <label for="nose-input">瀬</label><br>
      <button id="nose-submit">開始</button>
    </div>
  </div>


  <script type="module" src="main.ts"></script>
</body>

</html>
